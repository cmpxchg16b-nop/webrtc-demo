name: inet-webrtc-chat
networks:
  inet-webrtc-chat:
    name: "inet-webrtc-chat"
    driver: bridge
    enable_ipv4: false
    enable_ipv6: true
services:
  cloudflared:
    container_name: inet-webrtc-cloudflared
    pull_policy: never
    image: cloudflare/cloudflared:latest
    networks:
      - inet-webrtc-chat
    volumes:
      - "./cfd_credentials.json:/app/cfd_credentials.json:ro"
      - "./cloudflared.conf.yaml:/app/cloudflared.conf.yaml:ro"
    command:
      - "tunnel"
      - "--no-autoupdate"
      - "--config=/app/cloudflared.conf.yaml"
      - "--edge-ip-version=6"
      - "run"
      - "${CLOUDFLARED_UUID}"

  # agents:
  #   container_name: inet-webrtc-agents
  #   image: webrtc-agents:latest
  #   build:
  #     context: "./../../../"
  #     dockerfile: "webrtc-agents/Dockerfile"
  #   pull_policy: never
  #   entrypoint: /app/entrypoint.sh
  #   environment:
  #     - "MANAGEMENT_API=/var/run/webrtc-server/management.sock"
  #     - "AVATAR_B64_PATH=/app/bot-avatar.png.dataurl"
  #   networks:
  #     - inet-webrtc-chat
  #   volumes:
  #     - "./bots_entrypoint.sh:/app/entrypoint.sh:ro"
  #     - "./.env:/app/.env:ro"
  #     - "./bot-avatar.png.dataurl:/app/bot-avatar.png.dataurl:ro"
  #     - "./shared-socks:/var/run/webrtc-server"
  #   working_dir: /app
