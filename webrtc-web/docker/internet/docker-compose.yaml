  #     - server
  #   command:
  #     - "/app/agents"
  #     - "--chatbot-model=deepseek/deepseek-v3.2"
  #     - "--ws-server=wss://${MAIN_DOMAIN}/api/ws"
  #     - "--ice-server=stun:stun.l.google.com:19302"
  #     - "--reconnect-on-disconnect"
  #     - "--reconnect-delay=3s"
  #     - "--openrouter-apikey-env=OPENROUTER_APIKEY"
  #     - "--prefer-ipv6=true"
  #     - "--bots-secret-env-file=.env.bots"

  server:
    container_name: inet-webrtc-server
    hostname: inet-webrtc-server
    build:
      context: "./../../../webrtc-server"
    image: webrtc-server:latest
    pull_policy: never
    volumes:
      - "./.env:/app/.env:ro"
      - "./shared-socks:/var/run/webrtc-server"
    command:
      - "--allowed-origin=https://${MAIN_DOMAIN}"
      - "--github-login-redir-url=https://${MAIN_DOMAIN}/api/github/login/auth"
      - "--login-success-redir-url=https://${MAIN_DOMAIN}/"
      - "--management-listen=/var/run/webrtc-server/management.sock"
      - "--debug=true"
    networks:
      - inet-webrtc-chat
  web:
    container_name: inet-webrtc-web
    hostname: inet-webrtc-web
    image: webrtc-chat:latest
    restart: unless-stopped
    pull_policy: never
    volumes:
      - "./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro"
      - "./servers.json:/usr/share/nginx/html/servers.json:ro"
    networks:
      - inet-webrtc-chat
