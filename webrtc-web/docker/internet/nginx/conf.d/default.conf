
# to create a new variable $cors_origin based on the value of Origin header
map $http_origin $cors_origin {
    hostnames; # Enables hostname matching

    default "";

    "https://chatty.best" $http_origin;

    "http://chatty.best" $http_origin;

    ~^https?://localhost(:[0-9]+)?$ $http_origin; # Allows localhost with any port for development
}

# WebSocket upgrade header handling
# This map sets the Connection header based on whether the client is requesting a WebSocket upgrade
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;

    server_name chatty.best;

    root /usr/share/nginx/html;

    # Forward X-Forwarded-For and X-Real-IP headers
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ws {
        resolver 127.0.0.11; # use docker's internal resolver here
        proxy_pass http://inet-webrtc-server:3001/ws;

        # WebSocket specific headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts for long-lived WebSocket connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Disable buffering for real-time communication
        proxy_buffering off;

        if ($cors_origin ~* "https?://(.+)") {
            add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
        }
    }

    location /api/ {
        resolver 127.0.0.11; # use docker's internal resolver here
        proxy_pass http://inet-webrtc-server:3001/;

        proxy_buffering off;
        add_header Cache-Control no-cache;
        add_header X-Accel-Buffering no;

        if ($cors_origin ~* "https?://(.+)") {
            add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
            # Other CORS headers can be added here
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
        }
    }

    location / {
        try_files $uri $uri.html $uri/ =404;

        if ($cors_origin ~* "https?://(.+)") {
            add_header 'Access-Control-Allow-Origin' "$cors_origin" always;
            # Other CORS headers can be added here
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Accept, Authorization, Cache-Control, Content-Type, DNT, If-Modified-Since, Keep-Alive, Origin, User-Agent, X-Requested-With' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
        }
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # use empty server name "" to catch requests that has no Host header field
    # use _ to catch all requests that wasn't caught by any prior handlers
    server_name "" _;

    location / {
        return 200 "Hello, World!\n";
    }
}
